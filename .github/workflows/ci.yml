name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: zap-ci-placeholder-test-bucket
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ZapServer.sln

      - name: Test
        run: dotnet test ZapServer.sln -c Release --filter "FullyQualifiedName!~UpdateCompanyInfoFileUploadTests"

  s3-tests:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_S3_BUCKET: ${{ vars.AWS_S3_BUCKET }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Restore
        run: dotnet restore ZapServer.sln

      - name: Test S3 integration
        run: dotnet test ZapServer.sln -c Release --filter "FullyQualifiedName~UpdateCompanyInfoFileUploadTests"
